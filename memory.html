<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Match</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      background: linear-gradient(135deg, #8b5cf6, #a78bfa);
      transition: background 0.5s ease;
      user-select: none;
    }

    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.5rem 0;
      flex-shrink: 0;
    }

    .btn-home {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.9rem, 3.5vw, 1.3rem);
      font-weight: 900;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
      border-radius: 999px;
      padding: 0.4em 1em;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-home:active {
      background: rgba(255,255,255,0.4);
      transform: scale(0.95);
    }

    .moves-label {
      font-size: clamp(1rem, 4vw, 1.5rem);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .grid-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1rem;
      width: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: clamp(0.4rem, 2vw, 0.75rem);
      width: 100%;
      max-width: 420px;
    }

    /* Card flip */
    .card-wrap {
      aspect-ratio: 1;
      perspective: 600px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.35s ease;
      border-radius: 16px;
    }

    .card-wrap.flipped .card-inner {
      transform: rotateY(180deg);
    }

    .card-front,
    .card-back {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      font-size: clamp(1.8rem, 8vw, 3rem);
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
    }

    .card-front {
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(4px);
    }

    .card-back {
      background: rgba(255,255,255,0.9);
      transform: rotateY(180deg);
    }

    .card-wrap.matched .card-back {
      background: rgba(187,247,208,0.95);
      border: 3px solid rgba(34,197,94,0.8);
      animation: starPop 0.4s ease;
    }

    @keyframes starPop {
      0%   { transform: rotateY(180deg) scale(0.8); }
      60%  { transform: rotateY(180deg) scale(1.12); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    /* Completion screen */
    .complete-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      flex: 1;
      width: 100%;
      padding: 2rem;
    }

    .complete-screen.visible { display: flex; }

    .complete-title {
      font-size: clamp(2.5rem, 12vw, 5rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.25);
    }

    .complete-moves {
      font-size: clamp(1.2rem, 5vw, 2rem);
      font-weight: 700;
      color: rgba(255,255,255,0.9);
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }

    .complete-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .complete-buttons a,
    .complete-buttons button {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(1.1rem, 5vw, 1.6rem);
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.25);
      border: none;
      border-radius: 999px;
      padding: 0.6em 1.8em;
      cursor: pointer;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .complete-buttons a:active,
    .complete-buttons button:active {
      background: rgba(255,255,255,0.4);
      transform: scale(0.95);
    }

    .spacer { height: 1rem; flex-shrink: 0; }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="index.html" class="btn-home">🏠</a>
    <div class="moves-label">Moves: <span id="moves">0</span></div>
  </div>

  <div class="grid-wrap" id="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <div class="complete-screen" id="complete-screen">
    <div class="complete-title">Well Done!</div>
    <div class="complete-moves" id="complete-moves"></div>
    <div class="complete-buttons">
      <button onclick="startGame()">Play Again</button>
      <a href="index.html">Home</a>
    </div>
  </div>

  <div class="spacer"></div>

  <script>
    const animals = [
      { name: 'Dog',       chinese: '狗',     emoji: '\uD83D\uDC36' },
      { name: 'Cat',       chinese: '猫',     emoji: '\uD83D\uDC31' },
      { name: 'Elephant',  chinese: '大象',   emoji: '\uD83D\uDC18' },
      { name: 'Lion',      chinese: '狮子',   emoji: '\uD83E\uDD81' },
      { name: 'Giraffe',   chinese: '长颈鹿', emoji: '\uD83E\uDD92' },
      { name: 'Monkey',    chinese: '猴子',   emoji: '\uD83D\uDC12' },
      { name: 'Penguin',   chinese: '企鹅',   emoji: '\uD83D\uDC27' },
      { name: 'Duck',      chinese: '鸭子',   emoji: '\uD83E\uDD86' },
      { name: 'Rabbit',    chinese: '兔子',   emoji: '\uD83D\uDC30' },
      { name: 'Bear',      chinese: '熊',     emoji: '\uD83D\uDC3B' },
      { name: 'Frog',      chinese: '青蛙',   emoji: '\uD83D\uDC38' },
      { name: 'Fish',      chinese: '鱼',     emoji: '\uD83D\uDC1F' },
      { name: 'Horse',     chinese: '马',     emoji: '\uD83D\uDC34' },
      { name: 'Cow',       chinese: '牛',     emoji: '\uD83D\uDC04' },
      { name: 'Pig',       chinese: '猪',     emoji: '\uD83D\uDC37' },
      { name: 'Sheep',     chinese: '羊',     emoji: '\uD83D\uDC11' },
      { name: 'Tiger',     chinese: '老虎',   emoji: '\uD83D\uDC2F' },
      { name: 'Zebra',     chinese: '斑马',   emoji: '\uD83E\uDD93' },
      { name: 'Owl',       chinese: '猫头鹰', emoji: '\uD83E\uDD89' },
      { name: 'Butterfly', chinese: '蝴蝶',   emoji: '\uD83E\uDD8B' },
    ];

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    let cards = [];
    let flipped = [];
    let matched = 0;
    let moves = 0;
    let locked = false;

    function buildGrid() {
      const chosen = shuffle(animals).slice(0, 6);
      const pairs = [];
      chosen.forEach((animal, i) => {
        pairs.push({ id: i * 2,     animal });
        pairs.push({ id: i * 2 + 1, animal });
      });
      return shuffle(pairs);
    }

    function renderGrid() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      cards.forEach((card, idx) => {
        const wrap = document.createElement('div');
        wrap.className = 'card-wrap';
        wrap.dataset.idx = idx;

        const inner = document.createElement('div');
        inner.className = 'card-inner';

        const front = document.createElement('div');
        front.className = 'card-front';
        front.textContent = '\uD83D\uDC3E'; // 🐾

        const back = document.createElement('div');
        back.className = 'card-back';
        back.textContent = card.animal.emoji;

        inner.appendChild(front);
        inner.appendChild(back);
        wrap.appendChild(inner);
        wrap.addEventListener('click', () => flipCard(idx));
        grid.appendChild(wrap);
      });
    }

    function getCardEl(idx) {
      return document.querySelector(`.card-wrap[data-idx="${idx}"]`);
    }

    function flipCard(idx) {
      if (locked) return;
      if (flipped.includes(idx)) return;
      const el = getCardEl(idx);
      if (el.classList.contains('matched')) return;

      el.classList.add('flipped');
      flipped.push(idx);

      if (flipped.length === 2) {
        locked = true;
        moves++;
        document.getElementById('moves').textContent = moves;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (cards[a].animal === cards[b].animal) {
        getCardEl(a).classList.add('matched');
        getCardEl(b).classList.add('matched');
        matched++;
        flipped = [];
        locked = false;
        if (matched === 6) {
          setTimeout(showComplete, 500);
        }
      } else {
        setTimeout(() => {
          getCardEl(a).classList.remove('flipped');
          getCardEl(b).classList.remove('flipped');
          flipped = [];
          locked = false;
        }, 1000);
      }
    }

    function showComplete() {
      document.getElementById('grid-wrap').style.display = 'none';
      document.getElementById('complete-moves').textContent = `You did it in ${moves} moves!`;
      document.getElementById('complete-screen').classList.add('visible');
    }

    function startGame() {
      matched = 0;
      moves = 0;
      flipped = [];
      locked = false;
      document.getElementById('moves').textContent = '0';
      document.getElementById('grid-wrap').style.display = '';
      document.getElementById('complete-screen').classList.remove('visible');
      cards = buildGrid();
      renderGrid();
    }

    startGame();
  </script>
</body>
</html>
