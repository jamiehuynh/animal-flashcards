<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      transition: background 0.5s ease;
      user-select: none;
    }

    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.5rem 0;
      flex-shrink: 0;
    }

    .counter {
      font-size: clamp(1rem, 4vw, 1.5rem);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.05em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .score {
      display: flex;
      gap: 1rem;
      font-size: clamp(0.9rem, 3.5vw, 1.3rem);
      font-weight: 700;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .score-correct { color: #bbf7d0; }
    .score-wrong   { color: #fecaca; }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      cursor: pointer;
      animation: none;
      flex: 1;
    }

    .card.bounce {
      animation: bounce 0.45s ease;
    }

    @keyframes bounce {
      0%   { transform: scale(0.85); opacity: 0.5; }
      60%  { transform: scale(1.06); opacity: 1; }
      80%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .emoji {
      font-size: 30vmin;
      line-height: 1;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.18));
    }

    .animal-name {
      font-size: clamp(2rem, 10vw, 5rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.25);
      letter-spacing: 0.04em;
    }

    .chinese-name {
      font-size: clamp(1.5rem, 7vw, 3.5rem);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
      letter-spacing: 0.1em;
    }

    .speak-hint {
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      color: rgba(255,255,255,0.65);
      font-weight: 700;
      margin-top: 0.25rem;
    }

    .nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
      padding-bottom: 1.5rem;
      flex-shrink: 0;
    }

    .score-buttons {
      display: flex;
      gap: 1.5rem;
    }

    .nav-buttons {
      display: flex;
      gap: 1rem;
    }

    .nav button {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }

    .btn-correct {
      font-size: clamp(1.3rem, 5vw, 2rem);
      padding: 0.6em 1.8em;
      background: rgba(34,197,94,0.85);
      color: #fff;
      backdrop-filter: blur(6px);
    }

    .btn-wrong {
      font-size: clamp(1.3rem, 5vw, 2rem);
      padding: 0.6em 1.8em;
      background: rgba(239,68,68,0.85);
      color: #fff;
      backdrop-filter: blur(6px);
    }

    .btn-correct:active { background: rgba(34,197,94,1);   transform: scale(0.95); }
    .btn-wrong:active   { background: rgba(239,68,68,1);   transform: scale(0.95); }

    .btn-nav {
      font-size: clamp(0.9rem, 3.5vw, 1.3rem);
      padding: 0.5em 1.5em;
      background: rgba(255,255,255,0.25);
      color: #fff;
      backdrop-filter: blur(6px);
      min-width: 5rem;
    }

    .btn-nav:active {
      background: rgba(255,255,255,0.4);
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <div class="counter" id="counter">1 / 20</div>
    <div class="score">
      <span class="score-correct">Correct: <span id="score-correct">0</span></span>
      <span class="score-wrong">Wrong: <span id="score-wrong">0</span></span>
    </div>
  </div>

  <div class="card" id="card" onclick="speak()">
    <div class="emoji" id="emoji"></div>
    <div class="animal-name" id="name"></div>
    <div class="chinese-name" id="chinese"></div>
    <div class="speak-hint">Tap to hear!</div>
  </div>

  <nav class="nav">
    <div class="score-buttons">
      <button class="btn-wrong"   onclick="score('wrong')">&#10007; Wrong</button>
      <button class="btn-correct" onclick="score('correct')">&#10003; Correct</button>
    </div>
    <div class="nav-buttons">
      <button class="btn-nav" onclick="go(-1)">&#8592; Prev</button>
      <button class="btn-nav" onclick="go(1)">Next &#8594;</button>
    </div>
  </nav>

  <script>
    const animals = [
      { name: 'Dog',       chinese: '狗',   emoji: '\uD83D\uDC36' },
      { name: 'Cat',       chinese: '猫',   emoji: '\uD83D\uDC31' },
      { name: 'Elephant',  chinese: '大象', emoji: '\uD83D\uDC18' },
      { name: 'Lion',      chinese: '狮子', emoji: '\uD83E\uDD81' },
      { name: 'Giraffe',   chinese: '长颈鹿', emoji: '\uD83E\uDD92' },
      { name: 'Monkey',    chinese: '猴子', emoji: '\uD83D\uDC12' },
      { name: 'Penguin',   chinese: '企鹅', emoji: '\uD83D\uDC27' },
      { name: 'Duck',      chinese: '鸭子', emoji: '\uD83E\uDD86' },
      { name: 'Rabbit',    chinese: '兔子', emoji: '\uD83D\uDC30' },
      { name: 'Bear',      chinese: '熊',   emoji: '\uD83D\uDC3B' },
      { name: 'Frog',      chinese: '青蛙', emoji: '\uD83D\uDC38' },
      { name: 'Fish',      chinese: '鱼',   emoji: '\uD83D\uDC1F' },
      { name: 'Horse',     chinese: '马',   emoji: '\uD83D\uDC34' },
      { name: 'Cow',       chinese: '牛',   emoji: '\uD83D\uDC04' },
      { name: 'Pig',       chinese: '猪',   emoji: '\uD83D\uDC37' },
      { name: 'Sheep',     chinese: '羊',   emoji: '\uD83D\uDC11' },
      { name: 'Tiger',     chinese: '老虎', emoji: '\uD83D\uDC2F' },
      { name: 'Zebra',     chinese: '斑马', emoji: '\uD83E\uDD93' },
      { name: 'Owl',       chinese: '猫头鹰', emoji: '\uD83E\uDD89' },
      { name: 'Butterfly', chinese: '蝴蝶', emoji: '\uD83E\uDD8B' },
    ];

    const gradients = [
      'linear-gradient(135deg, #f97316, #fb923c)',
      'linear-gradient(135deg, #ec4899, #f472b6)',
      'linear-gradient(135deg, #8b5cf6, #a78bfa)',
      'linear-gradient(135deg, #06b6d4, #22d3ee)',
      'linear-gradient(135deg, #10b981, #34d399)',
      'linear-gradient(135deg, #3b82f6, #60a5fa)',
      'linear-gradient(135deg, #f59e0b, #fbbf24)',
      'linear-gradient(135deg, #ef4444, #f87171)',
      'linear-gradient(135deg, #84cc16, #a3e635)',
      'linear-gradient(135deg, #14b8a6, #2dd4bf)',
    ];

    let current = 0;
    let correct = 0;
    let wrong = 0;

    const emojiEl    = document.getElementById('emoji');
    const nameEl     = document.getElementById('name');
    const chineseEl  = document.getElementById('chinese');
    const counterEl  = document.getElementById('counter');
    const cardEl     = document.getElementById('card');
    const correctEl  = document.getElementById('score-correct');
    const wrongEl    = document.getElementById('score-wrong');

    function render(skipAnim) {
      const a = animals[current];
      emojiEl.textContent   = a.emoji;
      nameEl.textContent    = a.name;
      chineseEl.textContent = a.chinese;
      counterEl.textContent = `${current + 1} / ${animals.length}`;
      document.body.style.background = gradients[current % gradients.length];

      if (!skipAnim) {
        cardEl.classList.remove('bounce');
        void cardEl.offsetWidth; // reflow to restart animation
        cardEl.classList.add('bounce');
      }
    }

    function go(dir) {
      current = (current + dir + animals.length) % animals.length;
      render();
    }

    function score(result) {
      if (result === 'correct') {
        correct++;
        correctEl.textContent = correct;
      } else {
        wrong++;
        wrongEl.textContent = wrong;
      }
      go(1);
    }

    let chineseVoice = null;

    function loadVoice() {
      const voices = window.speechSynthesis.getVoices();
      const zh = voices.filter(v => /zh[-_]CN|zh[-_]Hans|Mandarin|Tingting|Meijia/i.test(v.lang + ' ' + v.name));
      // Prefer female-sounding names, then any zh-CN voice
      const female = zh.find(v => /ting|mei|xiao|female/i.test(v.name));
      chineseVoice = female || zh[0] || null;
    }

    window.speechSynthesis.onvoiceschanged = loadVoice;
    loadVoice();

    function speak() {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(animals[current].chinese);
      utt.lang = 'zh-CN';
      utt.rate = 0.8;
      utt.pitch = 1.1;
      if (chineseVoice) utt.voice = chineseVoice;
      window.speechSynthesis.speak(utt);
    }

    // Initial render without animation
    render(true);
  </script>
</body>
</html>
