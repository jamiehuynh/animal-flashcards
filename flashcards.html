<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Flashcards</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.5s ease;
      user-select: none;
    }

    .counter {
      position: absolute;
      top: 1.2rem;
      font-size: clamp(1rem, 4vw, 1.5rem);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.05em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      cursor: pointer;
      animation: none;
    }

    .card.bounce {
      animation: bounce 0.45s ease;
    }

    @keyframes bounce {
      0%   { transform: scale(0.85); opacity: 0.5; }
      60%  { transform: scale(1.06); opacity: 1; }
      80%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    .emoji {
      font-size: 40vmin;
      line-height: 1;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,0.18));
    }

    .animal-name {
      font-size: clamp(2rem, 10vw, 5rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.25);
      letter-spacing: 0.04em;
    }

    .speak-hint {
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      color: rgba(255,255,255,0.65);
      font-weight: 700;
      margin-top: 0.25rem;
    }

    .nav {
      position: absolute;
      bottom: 2rem;
      display: flex;
      gap: 2rem;
    }

    .nav button {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(1.2rem, 5vw, 2rem);
      padding: 0.75em 2em;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.25);
      color: #fff;
      cursor: pointer;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      min-width: 7rem;
    }

    .nav button:active {
      background: rgba(255,255,255,0.4);
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div class="counter" id="counter">1 / 20</div>

  <div class="card" id="card" onclick="speak()">
    <div class="emoji" id="emoji"></div>
    <div class="animal-name" id="name"></div>
    <div class="speak-hint">Tap to hear!</div>
  </div>

  <nav class="nav">
    <button onclick="go(-1)">&#8592; Prev</button>
    <button onclick="go(1)">Next &#8594;</button>
  </nav>

  <script>
    const animals = [
      { name: 'Dog',       emoji: '\uD83D\uDC36' },
      { name: 'Cat',       emoji: '\uD83D\uDC31' },
      { name: 'Elephant',  emoji: '\uD83D\uDC18' },
      { name: 'Lion',      emoji: '\uD83E\uDD81' },
      { name: 'Giraffe',   emoji: '\uD83E\uDD92' },
      { name: 'Monkey',    emoji: '\uD83D\uDC12' },
      { name: 'Penguin',   emoji: '\uD83D\uDC27' },
      { name: 'Duck',      emoji: '\uD83E\uDD86' },
      { name: 'Rabbit',    emoji: '\uD83D\uDC30' },
      { name: 'Bear',      emoji: '\uD83D\uDC3B' },
      { name: 'Frog',      emoji: '\uD83D\uDC38' },
      { name: 'Fish',      emoji: '\uD83D\uDC1F' },
      { name: 'Horse',     emoji: '\uD83D\uDC34' },
      { name: 'Cow',       emoji: '\uD83D\uDC04' },
      { name: 'Pig',       emoji: '\uD83D\uDC37' },
      { name: 'Sheep',     emoji: '\uD83D\uDC11' },
      { name: 'Tiger',     emoji: '\uD83D\uDC2F' },
      { name: 'Zebra',     emoji: '\uD83E\uDD93' },
      { name: 'Owl',       emoji: '\uD83E\uDD89' },
      { name: 'Butterfly', emoji: '\uD83E\uDD8B' },
    ];

    const gradients = [
      'linear-gradient(135deg, #f97316, #fb923c)',
      'linear-gradient(135deg, #ec4899, #f472b6)',
      'linear-gradient(135deg, #8b5cf6, #a78bfa)',
      'linear-gradient(135deg, #06b6d4, #22d3ee)',
      'linear-gradient(135deg, #10b981, #34d399)',
      'linear-gradient(135deg, #3b82f6, #60a5fa)',
      'linear-gradient(135deg, #f59e0b, #fbbf24)',
      'linear-gradient(135deg, #ef4444, #f87171)',
      'linear-gradient(135deg, #84cc16, #a3e635)',
      'linear-gradient(135deg, #14b8a6, #2dd4bf)',
    ];

    let current = 0;

    const emojiEl = document.getElementById('emoji');
    const nameEl  = document.getElementById('name');
    const counterEl = document.getElementById('counter');
    const cardEl  = document.getElementById('card');

    function render(skipAnim) {
      const a = animals[current];
      emojiEl.textContent = a.emoji;
      nameEl.textContent  = a.name;
      counterEl.textContent = `${current + 1} / ${animals.length}`;
      document.body.style.background = gradients[current % gradients.length];

      if (!skipAnim) {
        cardEl.classList.remove('bounce');
        void cardEl.offsetWidth; // reflow to restart animation
        cardEl.classList.add('bounce');
      }
    }

    function go(dir) {
      current = (current + dir + animals.length) % animals.length;
      render();
      speak();
    }

    function speak() {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(animals[current].name);
      utt.lang = 'en-US';
      utt.rate = 0.85;
      utt.pitch = 1.1;
      window.speechSynthesis.speak(utt);
    }

    // Initial render without animation
    render(true);
  </script>
</body>
</html>
