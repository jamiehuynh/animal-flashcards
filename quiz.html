<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animal Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      overflow: hidden;
      transition: background 0.5s ease;
      user-select: none;
    }

    .top-bar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 1.5rem 0;
      flex-shrink: 0;
    }

    .btn-home {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(0.9rem, 3.5vw, 1.3rem);
      font-weight: 900;
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(6px);
      border-radius: 999px;
      padding: 0.4em 1em;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-home:active {
      background: rgba(255,255,255,0.4);
      transform: scale(0.95);
    }

    .progress {
      font-size: clamp(1rem, 4vw, 1.5rem);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }

    .question-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 1rem;
    }

    .prompt-en {
      font-size: clamp(2rem, 10vw, 4.5rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.25);
    }

    .prompt-zh {
      font-size: clamp(1.5rem, 7vw, 3rem);
      font-weight: 700;
      color: rgba(255,255,255,0.85);
      text-shadow: 0 2px 8px rgba(0,0,0,0.2);
      letter-spacing: 0.1em;
    }

    .choices {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1rem 1.5rem 2rem;
      width: 100%;
      max-width: 460px;
      flex-shrink: 0;
    }

    .choice-btn {
      font-family: 'Nunito', sans-serif;
      font-size: clamp(2.5rem, 12vw, 5rem);
      line-height: 1.15;
      background: rgba(255,255,255,0.22);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      padding: 0.4em 0;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn:active { transform: scale(0.94); }

    .choice-btn.correct {
      background: rgba(34,197,94,0.85);
      animation: bounce 0.45s ease;
    }

    .choice-btn.wrong {
      background: rgba(239,68,68,0.75);
      animation: shake 0.4s ease;
    }

    @keyframes bounce {
      0%   { transform: scale(0.85); }
      60%  { transform: scale(1.1); }
      80%  { transform: scale(0.97); }
      100% { transform: scale(1); }
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-8px); }
      40%  { transform: translateX(8px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    /* Final score screen */
    .score-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      flex: 1;
      width: 100%;
      padding: 2rem;
    }

    .score-screen.visible { display: flex; }

    .score-title {
      font-size: clamp(2rem, 10vw, 4rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0,0,0,0.25);
    }

    .score-value {
      font-size: clamp(3rem, 18vw, 7rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .score-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .score-buttons a,
    .score-buttons button {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(1.1rem, 5vw, 1.6rem);
      text-decoration: none;
      color: #fff;
      background: rgba(255,255,255,0.25);
      border: none;
      border-radius: 999px;
      padding: 0.6em 1.8em;
      cursor: pointer;
      backdrop-filter: blur(6px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .score-buttons a:active,
    .score-buttons button:active {
      background: rgba(255,255,255,0.4);
      transform: scale(0.95);
    }
  </style>
</head>
<body>

  <div class="top-bar">
    <a href="index.html" class="btn-home">🏠</a>
    <div class="progress" id="progress">1 / 10</div>
  </div>

  <div class="question-area" id="question-area">
    <div class="prompt-en" id="prompt-en"></div>
    <div class="prompt-zh" id="prompt-zh"></div>
  </div>

  <div class="choices" id="choices"></div>

  <div class="score-screen" id="score-screen">
    <div class="score-title">Your Score</div>
    <div class="score-value" id="final-score"></div>
    <div class="score-buttons">
      <button onclick="startQuiz()">Play Again</button>
      <a href="index.html">Home</a>
    </div>
  </div>

  <script>
    const animals = [
      { name: 'Dog',       chinese: '狗',     emoji: '\uD83D\uDC36' },
      { name: 'Cat',       chinese: '猫',     emoji: '\uD83D\uDC31' },
      { name: 'Elephant',  chinese: '大象',   emoji: '\uD83D\uDC18' },
      { name: 'Lion',      chinese: '狮子',   emoji: '\uD83E\uDD81' },
      { name: 'Giraffe',   chinese: '长颈鹿', emoji: '\uD83E\uDD92' },
      { name: 'Monkey',    chinese: '猴子',   emoji: '\uD83D\uDC12' },
      { name: 'Penguin',   chinese: '企鹅',   emoji: '\uD83D\uDC27' },
      { name: 'Duck',      chinese: '鸭子',   emoji: '\uD83E\uDD86' },
      { name: 'Rabbit',    chinese: '兔子',   emoji: '\uD83D\uDC30' },
      { name: 'Bear',      chinese: '熊',     emoji: '\uD83D\uDC3B' },
      { name: 'Frog',      chinese: '青蛙',   emoji: '\uD83D\uDC38' },
      { name: 'Fish',      chinese: '鱼',     emoji: '\uD83D\uDC1F' },
      { name: 'Horse',     chinese: '马',     emoji: '\uD83D\uDC34' },
      { name: 'Cow',       chinese: '牛',     emoji: '\uD83D\uDC04' },
      { name: 'Pig',       chinese: '猪',     emoji: '\uD83D\uDC37' },
      { name: 'Sheep',     chinese: '羊',     emoji: '\uD83D\uDC11' },
      { name: 'Tiger',     chinese: '老虎',   emoji: '\uD83D\uDC2F' },
      { name: 'Zebra',     chinese: '斑马',   emoji: '\uD83E\uDD93' },
      { name: 'Owl',       chinese: '猫头鹰', emoji: '\uD83E\uDD89' },
      { name: 'Butterfly', chinese: '蝴蝶',   emoji: '\uD83E\uDD8B' },
    ];

    const gradients = [
      'linear-gradient(135deg, #f97316, #fb923c)',
      'linear-gradient(135deg, #ec4899, #f472b6)',
      'linear-gradient(135deg, #8b5cf6, #a78bfa)',
      'linear-gradient(135deg, #06b6d4, #22d3ee)',
      'linear-gradient(135deg, #10b981, #34d399)',
      'linear-gradient(135deg, #3b82f6, #60a5fa)',
      'linear-gradient(135deg, #f59e0b, #fbbf24)',
      'linear-gradient(135deg, #ef4444, #f87171)',
      'linear-gradient(135deg, #84cc16, #a3e635)',
      'linear-gradient(135deg, #14b8a6, #2dd4bf)',
    ];

    let questions = [];
    let qIndex = 0;
    let score = 0;
    let answered = false;
    let gradientIndex = 0;

    // TTS
    let chineseVoice = null;
    function loadVoice() {
      const voices = window.speechSynthesis.getVoices();
      const zh = voices.filter(v => /^zh/i.test(v.lang));
      const female = zh.find(v => /ting|mei|xiao|sin|female/i.test(v.name));
      chineseVoice = female || zh[0] || null;
    }
    window.speechSynthesis.onvoiceschanged = loadVoice;
    loadVoice();

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'zh-CN';
      utt.rate = 0.8;
      utt.pitch = 1.1;
      if (chineseVoice) utt.voice = chineseVoice;
      window.speechSynthesis.speak(utt);
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildQuestions() {
      return shuffle(animals).slice(0, 10);
    }

    function getWrongChoices(correct) {
      return shuffle(animals.filter(a => a !== correct)).slice(0, 3);
    }

    function renderQuestion() {
      const animal = questions[qIndex];
      gradientIndex = (gradientIndex + 1) % gradients.length;
      document.body.style.background = gradients[gradientIndex];

      document.getElementById('progress').textContent = `${qIndex + 1} / 10`;
      document.getElementById('prompt-en').textContent = animal.name;
      document.getElementById('prompt-zh').textContent = animal.chinese;

      const choices = shuffle([animal, ...getWrongChoices(animal)]);
      const container = document.getElementById('choices');
      container.innerHTML = '';
      choices.forEach(a => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = a.emoji;
        btn.onclick = () => choose(a, animal, btn);
        container.appendChild(btn);
      });

      answered = false;
    }

    function choose(selected, correct, btn) {
      if (answered) return;
      answered = true;

      if (selected === correct) {
        btn.classList.add('correct');
        score++;
        speak(correct.chinese);
        setTimeout(() => {
          qIndex++;
          if (qIndex >= 10) showScore();
          else renderQuestion();
        }, 900);
      } else {
        btn.classList.add('wrong');
        btn.addEventListener('animationend', () => {
          btn.classList.remove('wrong');
          answered = false;
        }, { once: true });
      }
    }

    function showScore() {
      document.getElementById('question-area').style.display = 'none';
      document.getElementById('choices').style.display = 'none';
      document.getElementById('progress').textContent = '';
      document.getElementById('final-score').textContent = `${score} / 10`;
      document.getElementById('score-screen').classList.add('visible');
    }

    function startQuiz() {
      questions = buildQuestions();
      qIndex = 0;
      score = 0;
      document.getElementById('question-area').style.display = '';
      document.getElementById('choices').style.display = '';
      document.getElementById('score-screen').classList.remove('visible');
      renderQuestion();
    }

    startQuiz();
  </script>
</body>
</html>
